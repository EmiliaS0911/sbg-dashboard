<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ソフトバンクG (9984) 分析ダッシュボード</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', 'Hiragino Sans', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────── */
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
    }
    .company-block { min-width: 160px; }
    .company-name { font-size: 18px; font-weight: 700; color: #fff; }
    .ticker { color: #8b949e; font-size: 13px; margin-top: 2px; }

    .price-block { display: flex; flex-direction: column; gap: 3px; }
    .current-price { font-size: 30px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .price-change { font-size: 15px; font-weight: 600; }
    .up   { color: #3fb950; }
    .down { color: #f85149; }

    .meta-block { font-size: 13px; color: #8b949e; line-height: 1.7; }
    .meta-block span { color: #c9d1d9; font-weight: 600; }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .updated { font-size: 12px; color: #6e7681; }
    .refresh-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background .15s;
    }
    .refresh-btn:hover { background: #2ea043; }
    .refresh-btn:disabled { background: #333; cursor: default; }

    /* ─── Layout ──────────────────────────────────── */
    .container { padding: 16px 20px; max-width: 1700px; margin: 0 auto; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 11px 14px;
    }
    .stat-label { font-size: 11px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    .stat-value { font-size: 17px; font-weight: 700; color: #e6edf3; }

    /* Chart row */
    .chart-row {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 14px;
      margin-bottom: 14px;
      min-height: 520px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-header {
      padding: 10px 16px;
      border-bottom: 1px solid #30363d;
      font-size: 12px;
      font-weight: 700;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: .5px;
      flex-shrink: 0;
    }
    .card-body { padding: 16px; flex: 1; overflow-y: auto; }

    #tv-chart-wrap { flex: 1; min-height: 480px; }
    #tv-ta-wrap    { flex: 1; min-height: 480px; }

    /* Bottom row */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* Fundamental grid */
    .fund-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 16px;
    }
    .fund-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      gap: 8px;
    }
    .fund-item:last-child  { border-bottom: none; }
    .fund-label { font-size: 12px; color: #8b949e; white-space: nowrap; }
    .fund-value { font-size: 13px; font-weight: 700; color: #e6edf3; text-align: right; }

    /* News */
    .news-item {
      padding: 11px 0;
      border-bottom: 1px solid #21262d;
    }
    .news-item:last-child { border-bottom: none; }
    .news-title { font-size: 13px; color: #c9d1d9; line-height: 1.45; margin-bottom: 4px; }
    .news-title a { color: #58a6ff; text-decoration: none; }
    .news-title a:hover { text-decoration: underline; }
    .news-meta { font-size: 11px; color: #6e7681; }

    /* Loading / error */
    .loading { color: #8b949e; font-size: 13px; text-align: center; padding: 24px; }
    .error   { color: #f85149; font-size: 13px; line-height: 1.6; }
    .fallback-links { margin-top: 12px; }
    .fallback-links a { color: #58a6ff; text-decoration: none; display: block; margin-bottom: 6px; font-size: 13px; }

    /* NAV note */
    .nav-note {
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #8b949e;
      margin-top: 10px;
      line-height: 1.6;
    }
    .nav-note strong { color: #e6edf3; }
  </style>
</head>

<!-- ─── Data fetch (Alpha Vantage API) ─ -->
<script>
// ── Formatters ───────────────────────────────────
function fmtNum(n, d = 1) {
  if (n == null || isNaN(n)) return '―';
  return n.toLocaleString('ja-JP', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '―';
  return Math.round(n).toLocaleString('ja-JP');
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '―';
  return (n * 100).toFixed(2) + '%';
}
function fmtPctStr(s) {
  if (!s) return '―';
  return parseFloat(s).toFixed(2) + '%';
}
function fmtJPY(n) {
  if (n == null || isNaN(n)) return '―';
  if (n >= 1e12) return (n / 1e12).toFixed(1) + '兆円';
  if (n >= 1e8)  return (n / 1e8).toFixed(0)  + '億円';
  if (n >= 1e4)  return (n / 1e4).toFixed(0)  + '万円';
  return fmtInt(n) + '円';
}
function fmtUSD(n) {
  if (n == null || isNaN(n)) return '―';
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(1)  + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(1)  + 'M';
  return '$' + n.toFixed(2);
}
function fmtVol(n) {
  if (n == null || isNaN(n)) return '―';
  if (n >= 1e8) return (n / 1e8).toFixed(1) + '億株';
  if (n >= 1e4) return (n / 1e4).toFixed(0) + '万株';
  return fmtInt(n) + '株';
}
function fmtAVDate(s) {
  // "20260613T120000" → "2026年6月13日"
  if (!s || s.length < 8) return '';
  const y = s.slice(0,4), m = s.slice(4,6), d = s.slice(6,8);
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}
function safeNum(s) {
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

// ── Alpha Vantage fetch (no proxy needed — supports CORS) ──
const AV_KEY = '2JWFAEIKIZ40QPTL';
const AV_BASE = 'https://www.alphavantage.co/query';

async function avFetch(params, timeoutMs = 12000) {
  const url = AV_BASE + '?' + new URLSearchParams({ ...params, apikey: AV_KEY });
  const res = await fetch(url, { signal: AbortSignal.timeout(timeoutMs) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Load fundamentals + price ────────────────────
async function loadFundamentals() {
  try {
    // Fetch price + overview in parallel
    const [quoteData, overviewData] = await Promise.all([
      avFetch({ function: 'GLOBAL_QUOTE', symbol: 'SFTBY' }),
      avFetch({ function: 'OVERVIEW',     symbol: 'SFTBY' }),
    ]);

    const q = quoteData['Global Quote'] || {};
    const o = overviewData || {};

    // Price fields from GLOBAL_QUOTE
    const price    = safeNum(q['05. price']);
    const change   = safeNum(q['09. change']);
    const changePctRaw = q['10. change percent'] || '';
    const changePct = safeNum(changePctRaw.replace('%',''));
    const volume   = safeNum(q['06. volume']);
    const open     = safeNum(q['02. open']);
    const high     = safeNum(q['03. high']);
    const low      = safeNum(q['04. low']);
    const prevClose = safeNum(q['08. previous close']);
    const latestDay = q['07. latest trading day'] || '';

    // Fundamental fields from OVERVIEW
    const mcap     = safeNum(o['MarketCapitalization']);
    const per      = safeNum(o['PERatio']);
    const forwardPE = safeNum(o['ForwardPE']);
    const pbr      = safeNum(o['PriceToBookRatio']);
    const eps      = safeNum(o['EPS']);
    const bv       = safeNum(o['BookValue']);
    const divYield = safeNum(o['DividendYield']);
    const high52   = safeNum(o['52WeekHigh']);
    const low52    = safeNum(o['52WeekLow']);
    const profitMargin = safeNum(o['ProfitMargin']);
    const opMargin = safeNum(o['OperatingMarginTTM']);
    const roe      = safeNum(o['ReturnOnEquityTTM']);
    const revGrowth = safeNum(o['QuarterlyRevenueGrowthYOY']);
    const earnGrowth = safeNum(o['QuarterlyEarningsGrowthYOY']);
    const ev       = safeNum(o['EVToEBITDA']);
    const beta     = safeNum(o['Beta']);

    // ── Header
    document.getElementById('h-price').textContent =
      price != null ? `$${price.toFixed(2)} (SFTBY/USD)` : '―';

    const chEl = document.getElementById('h-change');
    if (change != null) {
      const up = change >= 0;
      chEl.className = `price-change ${up ? 'up' : 'down'}`;
      chEl.textContent = `${up ? '▲' : '▼'} $${Math.abs(change).toFixed(2)} (${Math.abs(changePct).toFixed(2)}%)`;
    }
    document.getElementById('h-mcap').textContent = fmtUSD(mcap);
    document.getElementById('h-vol').textContent  = fmtVol(volume);
    document.getElementById('h-updated').textContent =
      `最終更新: ${new Date().toLocaleString('ja-JP')}　基準日: ${latestDay}`;

    // ── Stats bar
    document.getElementById('s-per').textContent  = per      ? fmtNum(per, 1) + '倍'      : '―';
    document.getElementById('s-fper').textContent = forwardPE ? fmtNum(forwardPE,1) + '倍' : '―';
    document.getElementById('s-pbr').textContent  = pbr      ? fmtNum(pbr, 2) + '倍'      : '―';
    document.getElementById('s-eps').textContent  = eps      ? '$' + eps.toFixed(2)         : '―';
    document.getElementById('s-div').textContent  = divYield ? (divYield * 100).toFixed(2) + '%' : '―';
    document.getElementById('s-high').textContent = high52   ? '$' + high52.toFixed(2)     : '―';
    document.getElementById('s-low').textContent  = low52    ? '$' + low52.toFixed(2)      : '―';
    document.getElementById('s-pm').textContent   = profitMargin ? (profitMargin * 100).toFixed(1) + '%' : '―';

    // ── Fundamentals table
    const items = [
      ['時価総額(USD)',       fmtUSD(mcap)],
      ['当日始値(USD)',       open != null ? `$${open.toFixed(2)}`           : '―'],
      ['当日高値(USD)',       high != null ? `$${high.toFixed(2)}`            : '―'],
      ['当日安値(USD)',       low  != null ? `$${low.toFixed(2)}`             : '―'],
      ['前日終値(USD)',       prevClose != null ? `$${prevClose.toFixed(2)}` : '―'],
      ['出来高',             fmtVol(volume)],
      ['PER（実績TTM）',     per       ? fmtNum(per, 1) + '倍'       : '―'],
      ['PER（予想）',        forwardPE ? fmtNum(forwardPE, 1) + '倍' : '―'],
      ['PBR',                pbr       ? fmtNum(pbr, 2) + '倍'       : '―'],
      ['EPS（TTM）',         eps       ? '$' + eps.toFixed(2)         : '―'],
      ['1株純資産（BPS）',   bv        ? '$' + parseFloat(bv).toFixed(2) : '―'],
      ['配当利回り',         divYield  ? (divYield * 100).toFixed(2) + '%' : '―'],
      ['52週高値(USD)',       high52    ? '$' + high52.toFixed(2)     : '―'],
      ['52週安値(USD)',       low52     ? '$' + low52.toFixed(2)      : '―'],
      ['純利益率（TTM）',    profitMargin ? (profitMargin*100).toFixed(1)+'%' : '―'],
      ['営業利益率（TTM）',  opMargin  ? (opMargin*100).toFixed(1)+'%' : '―'],
      ['ROE（TTM）',         roe       ? (roe*100).toFixed(1)+'%'    : '―'],
      ['売上成長率（前四半期YoY）', revGrowth  ? (revGrowth*100).toFixed(1)+'%' : '―'],
      ['利益成長率（前四半期YoY）', earnGrowth ? (earnGrowth*100).toFixed(1)+'%' : '―'],
      ['ベータ値',           beta      ? fmtNum(beta, 2)              : '―'],
    ];

    document.getElementById('fund-body').innerHTML = `
      <div class="fund-grid">
        ${items.map(([l, v]) =>
          `<div class="fund-item">
             <span class="fund-label">${l}</span>
             <span class="fund-value">${v}</span>
           </div>`
        ).join('')}
      </div>
      <div class="nav-note">
        💡 財務データはSFTBY（米国OTC・USD建て）より取得。チャートはTSE:9984（円）。PER/PBR等の比率は同一。NAVは
        <a href="https://group.softbank/ja/ir/stock/sotp" target="_blank" style="color:#58a6ff;">SoftBank Group 公式IR</a>
        で確認。データ提供: Alpha Vantage（無料版・日次更新）
      </div>`;

  } catch (e) {
    document.getElementById('fund-body').innerHTML =
      `<div class="error">データ取得失敗: ${e.message}<br>
       <div class="fallback-links">
         <a href="https://finance.yahoo.co.jp/quote/9984.T" target="_blank">📎 Yahoo!ファイナンスで確認</a>
         <a href="https://group.softbank/ja/ir" target="_blank">📎 SoftBank Group IR</a>
       </div></div>`;
  }
}

// ── Load news ────────────────────────────────────
async function loadNews() {
  try {
    const data = await avFetch({
      function: 'NEWS_SENTIMENT',
      tickers: 'SFTBY',
      limit: '10',
    });

    const feed = data.feed || [];
    if (feed.length === 0) throw new Error('記事なし');

    document.getElementById('news-body').innerHTML = feed.slice(0, 10).map(n => `
      <div class="news-item">
        <div class="news-title">
          <a href="${n.url || '#'}" target="_blank" rel="noopener noreferrer">${n.title || '(タイトルなし)'}</a>
        </div>
        <div class="news-meta">
          ${n.source ? n.source + ' ／ ' : ''}${fmtAVDate(n.time_published)}
          ${n.overall_sentiment_label ? ` ／ センチメント: ${n.overall_sentiment_label}` : ''}
        </div>
      </div>`).join('');

  } catch (e) {
    document.getElementById('news-body').innerHTML = `
      <div class="error">
        ニュースの自動取得ができませんでした。<br>以下のサイトでご確認ください：
        <div class="fallback-links">
          <a href="https://finance.yahoo.co.jp/quote/9984.T/news" target="_blank">📰 Yahoo!ファイナンス ニュース</a>
          <a href="https://www.nikkei.com/nkd/company/news/?scode=9984" target="_blank">📰 日経電子版 企業ニュース</a>
          <a href="https://group.softbank/ja/news" target="_blank">📰 SoftBank Group 公式ニュース</a>
        </div>
      </div>`;
  }
}

// ── Init ─────────────────────────────────────────
function setRefreshState(loading) {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = loading;
  btn.textContent = loading ? '⏳ 読み込み中…' : '🔄 更新';
}

async function loadAll() {
  setRefreshState(true);
  await Promise.allSettled([loadFundamentals(), loadNews()]);
  setRefreshState(false);
}

document.addEventListener('DOMContentLoaded', loadAll);
</script>

</body>
